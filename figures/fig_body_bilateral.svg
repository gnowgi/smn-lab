<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="arS" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7a7a82"/>
    </marker>
    <pattern id="hatch2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#888" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="560" height="440" fill="#ffffff"/>
  <text x="280" y="28" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#1a1a1a">Bilateral two-limb unit — top-down view (E1, E3)</text>
  <text x="280" y="46" text-anchor="middle" font-size="11.5" fill="#555">limbs swing horizontally in place; base pinned to the world; an object in each tip's reach</text>

  <!-- axes -->
  <line x1="40" y1="410" x2="90" y2="410" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="40" y1="410" x2="40" y2="360" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="95" y="414" font-size="11" fill="#1a1a1a">x (forward)</text>
  <text x="44" y="356" font-size="11" fill="#1a1a1a">y</text>

  <!-- base bar (pinned), spans y = -0.10..+0.10 at x~0 -->
  <rect x="112" y="150" width="16" height="160" fill="url(#hatch2)" stroke="#333" stroke-width="1.5"/>
  <rect x="112" y="150" width="16" height="160" fill="#3a3a40" opacity="0.55"/>
  <text x="120" y="335" text-anchor="middle" font-size="11" fill="#333">base (pinned)</text>

  <!-- pivots -->
  <circle cx="120" cy="160" r="6" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="120" cy="300" r="6" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>

  <!-- left limb (+y) -->
  <line x1="120" y1="160" x2="305" y2="160" stroke="#2c6a9c" stroke-width="9" stroke-linecap="round"/>
  <rect x="299" y="152" width="16" height="16" fill="#cfe0ee" stroke="#1a1a1a" stroke-width="1.3"/>
  <!-- right limb (-y) -->
  <line x1="120" y1="300" x2="305" y2="300" stroke="#2c6a9c" stroke-width="9" stroke-linecap="round"/>
  <rect x="299" y="292" width="16" height="16" fill="#cfe0ee" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="210" y="150" text-anchor="middle" font-size="10.5" fill="#2c6a9c">limb L  (0.22 m)</text>
  <text x="210" y="320" text-anchor="middle" font-size="10.5" fill="#2c6a9c">limb R</text>

  <!-- swing arcs (horizontal, in plane) -->
  <path d="M 285 130 A 170 170 0 0 1 320 185" fill="none" stroke="#888" stroke-width="1.4" marker-end="url(#arS)"/>
  <path d="M 320 275 A 170 170 0 0 1 285 330" fill="none" stroke="#888" stroke-width="1.4" marker-end="url(#arS)"/>
  <text x="345" y="160" font-size="10" fill="#7a7a82">swing</text>

  <!-- objects: x~0.20, y=+/-0.17 (outboard of base +/-0.10) -->
  <rect x="300" y="96" width="26" height="26" fill="#d8d8dc" stroke="#1a1a1a" stroke-width="1.4"/>
  <rect x="300" y="338" width="26" height="26" fill="#d8d8dc" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="312" y1="122" x2="306" y2="152" stroke="#9a9aa0" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="312" y1="338" x2="306" y2="308" stroke="#9a9aa0" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="335" y="100" font-size="11" fill="#333">object L</text>
  <text x="335" y="360" font-size="11" fill="#333">object R</text>
  <text x="412" y="116" text-anchor="middle" font-size="10" fill="#555">free / movable /</text>
  <text x="412" y="129" text-anchor="middle" font-size="10" fill="#555">compliant / fixed</text>

  <!-- antagonist note at a pivot -->
  <line x1="175" y1="160" x2="128" y2="150" stroke="#b03030" stroke-width="1.8"/>
  <line x1="175" y1="160" x2="128" y2="170" stroke="#b03030" stroke-width="1.8"/>
  <text x="190" y="200" font-size="9.5" fill="#b03030">pull-only</text>
  <text x="190" y="212" font-size="9.5" fill="#b03030">antagonist pair</text>

  <text x="280" y="430" text-anchor="middle" font-size="10.5" fill="#444" font-style="italic">gravity is &#8869; to the page: it loads the structure but not the vertical-axis hinge — isolating object resistance.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b03030"/>
    </marker>
    <marker id="arrk" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1a1a1a"/>
    </marker>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#888" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="560" height="380" fill="#ffffff"/>
  <text x="280" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">A zone — one DOF, an antagonist pull pair, a dual interface</text>

  <!-- fixed base -->
  <rect x="60" y="160" width="34" height="90" fill="url(#hatch)" stroke="#555" stroke-width="1.2"/>
  <text x="77" y="270" text-anchor="middle" font-size="11" fill="#555">fixed base</text>

  <!-- hinge -->
  <circle cx="130" cy="205" r="7" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="130" y1="248" x2="130" y2="214" stroke="#1a1a1a" stroke-width="0.8"/>
  <text x="130" y="262" text-anchor="middle" font-size="11" fill="#1a1a1a">hinge</text>

  <!-- limb rod -->
  <line x1="130" y1="205" x2="380" y2="205" stroke="#2c6a9c" stroke-width="11" stroke-linecap="round"/>
  <text x="255" y="198" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">limb</text>

  <!-- tip site -->
  <rect x="373" y="195" width="18" height="18" fill="#cfe0ee" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- antagonist pull-only tendons (force toward base) -->
  <line x1="250" y1="200" x2="96" y2="172" stroke="#b03030" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="250" y1="210" x2="96" y2="238" stroke="#b03030" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="178" y="158" text-anchor="middle" font-size="11" fill="#b03030">pull only (press)</text>
  <text x="238" y="258" text-anchor="middle" font-size="11" fill="#b03030">pull only (retract)</text>
  <text x="150" y="300" text-anchor="middle" font-size="10.5" fill="#b03030" font-style="italic">co-activation of the pair = a "balance"</text>

  <!-- sensor tags -->
  <!-- proprioception -->
  <line x1="160" y1="120" x2="133" y2="198" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arrk)"/>
  <rect x="120" y="100" width="170" height="22" rx="4" fill="#eef3f8" stroke="#1a1a1a" stroke-width="1"/>
  <text x="205" y="115" text-anchor="middle" font-size="11" fill="#1a1a1a">joint angle &#952; &#8226; velocity &#952;&#775;</text>
  <!-- effort -->
  <line x1="300" y1="330" x2="200" y2="208" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arrk)"/>
  <rect x="250" y="332" width="140" height="22" rx="4" fill="#eef3f8" stroke="#1a1a1a" stroke-width="1"/>
  <text x="320" y="347" text-anchor="middle" font-size="11" fill="#1a1a1a">actuator effort</text>
  <!-- contact -->
  <line x1="455" y1="255" x2="389" y2="210" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arrk)"/>
  <rect x="415" y="258" width="115" height="22" rx="4" fill="#eef3f8" stroke="#1a1a1a" stroke-width="1"/>
  <text x="472" y="273" text-anchor="middle" font-size="11" fill="#1a1a1a">tip contact</text>

  <text x="280" y="372" text-anchor="middle" font-size="11" fill="#444" font-style="italic">All four are read through the same coupling that drives the two pulls — the dual interface (sense + act in one).</text>
</svg>

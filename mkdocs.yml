site_name: smn-lab
site_description: An experimental bench for cognitive science based on the SMN architecture
repo_url: https://github.com/gnowgi/smn-lab
theme:
  name: material
nav:
  - Home: index.md
  # Reference cluster — how to read the bench; background for the whole arc.
  - "The framework (reference)":
      - Concepts: concepts.md
      - "Formalism ↔ code ↔ live bench": formalism-and-code.md
      - "Self-model read-out: model vs. measurement": self-model-and-measurement.md
      - Lab interface: lab-interface.md
      - Assumptions: assumptions.md
      - Datasets (generative model): datasets.md
      - "Pre-registration & status": test-plan.md
  # The groups below follow the preprint's section order (arXiv:2605.26856).
  - "§1 · The modular unit — the moving opponent body":
      - "C0 — it moves (non-inertial axial crawler)": experiments/c0_crawler.md
      - "S0 — locomotion is a network effect (coupling sweep)": experiments/sweep_c0_coupling.md
      - "Antagonistic benefits — the opponent pair earns its keep": experiments/sweep_pred3_antagonistic.md
      - "R1 — tonic-load coupling (partner tone rises with load)": experiments/sweep_r1_tonic_load.md
      - "R2 — resumption latency (post-halt reversal is faster)": experiments/sweep_r2_resumption.md
  - "§2 · Generative morphology":
      - "Diagram grammar": diagram-grammar.md
      - "The Construction of Experience": construction-of-experience.md
  - "§3 · The self-model":
      - "Phase I — overview (self, world, object)": phase1.md
      - "The read-out — one function, any body": experiments/self_model_topology.md
      - "Branched body — same function, a tree": experiments/branched_self_model.md
      - "Sheet & tube — same function, a 2-D body": experiments/lattice_self_model.md
      - "Nested lattice — same function, any level (scale-invariance)": experiments/nested_lattice_self_model.md
  - "§4 · The world-model & self / world / other":
      - "Self vs world — the reafference cut (Q2)": experiments/q2_reafference.md
      - "The cut in the self-graph (W3)": experiments/reafference_cut_self_graph.md
      - "W1 — a world feature in the self-graph": experiments/world_in_self_graph.md
      - "W2 — world-geometry in the self-frame": experiments/world_geometry_self_frame.md
      - "Q1 — modulation builds the world model": experiments/sweep_q1_modulation.md
      - "S1 — more body ≠ more world (segment-count null)": experiments/sweep_geometry_worldmodel.md
      - "Q1b — resolution = CAZ density, not transducer count (hinges to §7)": experiments/sweep_q1b_resolution.md
      - "Resolution exponent — R ~ ρ^a measured (a=0.49, predicted ½)": experiments/sweep_resolution_exponents.md
      - "R5 — intra-body dual-signal residual (self/world structure)": experiments/sweep_r5_dual_signal.md
      - "R4 — world-model adaptation dynamics (κ>0) [preregistered]": experiments/sweep_r4_adaptation.md
  - "§5 · Haltability & object-directedness":
      - "C1 — objecthood as resistance (halt-on-contact)": experiments/c1_touch.md
      - "E1 — objecthood as resistance (manipulator)": experiments/p4_manipulator_objecthood.md
      - "E3 — the haltable pattern generates object-directedness": experiments/p6_haltability_aboutness.md
      - "Haltability signatures — the deceptive-reach prediction": experiments/sweep_pred1_haltability.md
  - "§6 · From resistance to object (multimodal)":
      - "E2 — self / field / object factoring": experiments/p5_self_field_object.md
      - "P3 — cross-modal discrimination (deferred; the object seam)": experiments/p3_crossmodal_discrimination.md
  - "§7 · Taxonomy — more body, not more transducers":
      - "Phase II — overview": phase2.md
      - "Haltability — the pivot that layering enables": experiments/haltability.md
      - "World model scales with the network (E4)": experiments/p7_scaling_network.md
      - "Objecthood as a coupling-density transition (E4b)": experiments/p8_objecthood_transition.md
      - "Zonal dissociations — the nested-zone prediction": experiments/sweep_pred2_zonal.md
  # First exploratory studies — kept as provenance, read as proofs-of-concept.
  - "Provenance / exploratory studies":
      - "About these studies (reproducibility note)": reproducibility.md
      - P0 — reafference: experiments/p0_reafference.md
      - P0-visual — reafference at the visual level: experiments/p0_visual.md
      - P1-visual — multi-CAZ eye, ±body yaw: experiments/p1_visual.md
      - P1-visual / static-world variant: experiments/p1v_static_world.md
      - P1 — world model: experiments/p1_world_model.md
      - P2 — self-localized: experiments/p2_world_model.md
      - Balance-beam sweep: experiments/p2_topology_sweep.md
      - Living snapshot (map decay): experiments/p2_living_snapshot.md
      - Basal coupling (why move): experiments/p2_basal_coupling.md
      - Map-guided foraging (decay as survival): experiments/p2_map_guided_foraging.md
  - Integrations:
      - NetLogo (feasibility report): integrations/netlogo.md
  - "Contributing experiments (branches & doc versions)": contributing.md
hooks:
  - docs/hooks.py
extra_javascript:
  # equation ↔ code ↔ live-bench must render identically: MathJax renders the
  # arithmatex output; the CDN loads at view time (public site, no CSP).
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
markdown_extensions:
  - tables
  - admonition
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  # single-source-of-truth: code shown on a page is READ FROM smn_lab/*.py at
  # build time (named sections), never pasted. base_path is the repo root (the
  # mkdocs working dir); check_paths fails the build if an anchor goes missing.
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
